<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: 
        linear-gradient(to right, rgba(10,15,28,0.9) 40%, rgba(10,15,28,0.2)),
        url("https://static.wixstatic.com/media/bee928_b3673509f58a4bf9838569a9485d2c96~mv2.gif");
      
      background-size: cover;
      background-position: right center;
      background-repeat: no-repeat;
      color: #fff;
      padding: 20px 12px 30px;
    }

    .container {
      max-width: 360px;
      margin: auto;
      text-align: center;
      backdrop-filter: blur(6px);
    }

    .profile-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid rgba(0,200,255,0.6);
      object-fit: cover;
      margin: 15px auto;
      display: block;
      box-shadow: 0 0 20px rgba(0,200,255,0.6);
    }

    h1 { font-size: 22px; }
    h2 { font-size: 14px; color: #ccc; }
    p { font-size: 13px; color: #aaa; margin-bottom: 15px; }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      overflow: hidden;
      transition: 0.3s;
    }

    .btn i {
      position: absolute;
      left: 14px;
      font-size: 14px;
    }

    .btn:hover {
      transform: scale(1.04);
    }

    .btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.5),
        transparent
      );
      transform: skewX(-25deg);
      animation: brilho 3s infinite;
    }

    @keyframes brilho {
      0% { left: -75%; }
      100% { left: 130%; }
    }

    .servico {
      background: linear-gradient(135deg, #4facfe, #00c6ff);
    }

    .whatsapp { background: #25D366; }

    .instagram {
      background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
    }

    .linkedin { background: #0A66C2; }
    .youtube { background: #FF0000; }

    .cpf {
      background: linear-gradient(135deg, #f7c948, #d4a017);
      color: #000;
    }

    .cnpj {
      background: linear-gradient(135deg, #005bea, #00c6fb);
    }

    .video-box {
      margin: 15px auto;
      border-radius: 14px;
      overflow: hidden;
      width: 100%;
      max-width: 300px;
      aspect-ratio: 9 / 16;
      box-shadow: 0 0 20px rgba(0,200,255,0.4);
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .sound-btn {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      font-size: 12px;
    }

    .footer {
      margin-top: 15px;
      font-size: 11px;
      color: #777;
    }

    /* 🔥 AJUSTE MOBILE */
    @media (max-width: 480px) {
      body {
        background-position: center top;
        background-size: cover;
      }

      .container {
        max-width: 100%;
      }
    }
  </style>
</head>

<script>

function onYouTubeIframeAPIReady() {

      listType: 'playlist',
      list: 'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR',
      autoplay: 1,
      mute: 1,

    },
