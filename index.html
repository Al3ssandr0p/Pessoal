<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ewerton Renato | Contabilidade</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Ícones (Font Awesome) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0f2027, #203a43, #0a0f1c);
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 380px;
      text-align: center;
      padding: 20px;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #00ff88;
      object-fit: cover;
      margin-bottom: 15px;
      box-shadow: 0 0 25px rgba(0,255,136,0.6);
      transition: 0.3s;
    }

    .profile-img:hover {
      transform: scale(1.05);
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      text-transform: uppercase;
    }

    h2 {
      font-size: 16px;
      font-weight: 300;
      margin-bottom: 10px;
      color: #ccc;
      text-transform: uppercase;
    }

    p {
      font-size: 14px;
      margin-bottom: 25px;
      color: #aaa;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #00ff88, #00cc66);
      color: #003322;
      text-decoration: none;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
      box-shadow: 0 8px 20px rgba(0,255,136,0.3);
      transition: 0.3s;
      backdrop-filter: blur(0px);
    }

    .btn i {
      font-size: 18px;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 25px rgba(0,255,136,0.3);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="https://yt3.googleusercontent.com/ioNCpb6Bnv0ONnFAwPRjMiyZzqP0988Lx3Wxexnx9VDFrP9rlWF5FMSO6g21qobGqqplpWI-xw=s900-c-k-c0x00ffffff-no-rj" alt="Foto" class="profile-img">

    <h1>Ewerton Renato</h1>
    <h2>Contabilidade</h2>
    <p>Soluções contábeis para o seu negócio</p>

    <a href="#" class="btn">
      <i class="fas fa-briefcase"></i> Consultoria Empresarial
    </a>

    <a href="https://wa.me/5582999284225?text=Ol%C3%A1" class="btn">
      <i class="fab fa-whatsapp"></i> Meu WhatsApp
    </a>

    <a href="https://www.instagram.com/contabilsheets" class="btn">
      <i class="fab fa-instagram"></i> Meu Instagram
    </a>

    <a href="https://www.youtube.com/@contabilsheets" class="btn">
      <i class="fab fa-youtube"></i> Conteúdos e Dicas
    </a>

    <div class="footer">© 2026 - Ewerton Renato</div>
  </div>
</body>
</html>
