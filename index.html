<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTÁBIL SHEETS | Ewerton Renato</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(to right, rgba(10,15,28,0.85) 40%, rgba(10,15,28,0.2)),
        url("https://static.wixstatic.com/media/bee928_b3673509f58a4bf9838569a9485d2c96~mv2.gif");
      background-size: cover;
      background-position: right center;
      background-repeat: no-repeat;
      color: #fff;
      padding: 30px 15px 40px;
      display: flex;
      justify-content: center; /* 🔥 centraliza desktop */
    }

    .container {
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .profile-img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 4px solid rgba(0,200,255,0.6);
      object-fit: cover;
      margin: 20px auto;
      box-shadow: 0 0 25px rgba(0,200,255,0.6);
    }

    h1 { font-size: 24px; }
    h2 { font-size: 15px; color: #ccc; }
    p { font-size: 13px; color: #aaa; margin-bottom: 20px; }

    /* 🔥 BOTÕES ORIGINAIS (GRADIENTE) */
    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      overflow: hidden;
      transition: 0.3s;
    }

    .btn i {
      position: absolute;
      left: 16px;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* GRADIENTES */
    .servico {
      background: linear-gradient(135deg, #4facfe, #00c6ff);
    }

    .whatsapp { background: #25D366; }

    .instagram {
      background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
    }

    .linkedin { background: #0A66C2; }
    .youtube { background: #FF0000; }

    .cpf {
      background: linear-gradient(135deg, #f7c948, #d4a017);
      color: #000;
    }

    .cnpj {
      background: linear-gradient(135deg, #005bea, #00c6fb);
    }

    /* 🎬 ANIMAÇÃO MELHORADA */
    .fade-slide {
      opacity: 0;
      transform: translateY(40px);
      animation: fadeSlideUp 1.2s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes fadeSlideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 📱 MOBILE */
    @media (max-width: 480px) {
      body {
        background-position: center top;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <img src="https://i.imgur.com/oT7g5CR.jpeg" class="profile-img fade-slide" style="animation-delay:0.3s;">

  <h1 class="fade-slide" style="animation-delay:0.6s;">CONTÁBIL SHEETS</h1>
  <h2 class="fade-slide" style="animation-delay:0.8s;">Ewerton Renato</h2>
  <p class="fade-slide" style="animation-delay:1s;">SOLUÇÕES CONTÁBEIS PARA O SEU NEGÓCIO</p>

  <a href="#" class="btn servico fade-slide" style="animation-delay:1.3s;">CONSULTORIA</a>
  <a href="#" class="btn servico fade-slide" style="animation-delay:1.5s;">CONTABILIDADE</a>
  <a href="#" class="btn servico fade-slide" style="animation-delay:1.7s;">MEI</a>

  <a href="#" class="btn whatsapp fade-slide" style="animation-delay:1.9s;">WHATSAPP</a>
  <a href="#" class="btn instagram fade-slide" style="animation-delay:2.1s;">INSTAGRAM</a>
  <a href="#" class="btn linkedin fade-slide" style="animation-delay:2.3s;">LINKEDIN</a>
  <a href="#" class="btn youtube fade-slide" style="animation-delay:2.5s;">YOUTUBE</a>

  <a href="#" class="btn cpf fade-slide" style="animation-delay:2.7s;">CONSULTAR CPF</a>
  <a href="#" class="btn cnpj fade-slide" style="animation-delay:2.9s;">CONSULTAR CNPJ</a>

</div>

</body>
</html>
