<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTÁBIL SHEETS | Ewerton Renato</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(to right, rgba(10,15,28,0.9) 35%, rgba(10,15,28,0.2)),
        url("https://static.wixstatic.com/media/bee928_b3673509f58a4bf9838569a9485d2c96~mv2.gif");
      background-size: cover;
      background-position: right center;
      background-repeat: no-repeat;
      color: #fff;
      padding: 20px 10px 30px;
    }

    .container {
      max-width: 340px;
      margin-left: 10px;
      margin-right: auto;
      text-align: center;
      backdrop-filter: blur(4px);
    }

    .profile-img {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      border: 3px solid rgba(0,200,255,0.6);
      object-fit: cover;
      margin: 15px auto;
      box-shadow: 0 0 20px rgba(0,200,255,0.6);
    }

    h1 { font-size: 22px; }
    h2 { font-size: 14px; color: #ccc; }
    p { font-size: 13px; color: #aaa; margin-bottom: 15px; }

    /* 🔥 BOTÕES GLASS */
    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      margin: 8px auto;
      width: 90%;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;

      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);

      transition: 0.3s;
    }

    .btn i {
      position: absolute;
      left: 14px;
    }

    .btn:hover {
      transform: scale(1.04);
      background: rgba(255,255,255,0.15);
    }

    /* CORES LEVES */
    .servico { background: rgba(0,198,255,0.25); }
    .whatsapp { background: rgba(37,211,102,0.25); }
    .instagram { background: rgba(255,0,150,0.25); }
    .linkedin { background: rgba(10,102,194,0.25); }
    .youtube { background: rgba(255,0,0,0.25); }
    .cpf { background: rgba(212,160,23,0.3); }
    .cnpj { background: rgba(0,91,234,0.25); }

    .video-box {
      margin: 15px auto;
      border-radius: 14px;
      overflow: hidden;
      width: 100%;
      max-width: 280px;
      aspect-ratio: 9 / 16;
      box-shadow: 0 0 20px rgba(0,200,255,0.4);
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .sound-btn {
      margin-top: 8px;
      width: 90%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      font-size: 12px;
    }

    .footer {
      margin-top: 15px;
      font-size: 11px;
      color: #777;
    }

    /* 🔥 ANIMAÇÃO APP */
    .fade-slide {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeSlideUp 0.6s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes fadeSlideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 📱 MOBILE */
    @media (max-width: 480px) {
      body {
        background-position: center top;
      }

      .btn {
        width: 85%;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <img src="https://i.imgur.com/oT7g5CR.jpeg" class="profile-img fade-slide" style="animation-delay:0.1s;">

  <h2 class="fade-slide" style="animation-delay:0.3s;">Ewerton Renato</h2>
  <p class="fade-slide" style="animation-delay:0.4s;">SOLUÇÕES CONTÁBEIS PARA O SEU NEGÓCIO</p>

  <a href="#" class="btn servico fade-slide" style="animation-delay:0.6s;"><i class="fas fa-briefcase"></i>CONTABILIDADE</a>
  <a href="#" class="btn servico fade-slide" style="animation-delay:0.7s;"><i class="fas fa-briefcase"></i>MEI</a>

  <a href="https://wa.me/5582999284225" target="_blank" class="btn whatsapp fade-slide" style="animation-delay:0.8s;">
    <i class="fab fa-whatsapp"></i>WHATSAPP
  </a>

  <a href="https://www.instagram.com/contabilsheets/" target="_blank" class="btn instagram fade-slide" style="animation-delay:0.9s;">
    <i class="fab fa-instagram"></i>INSTAGRAM
  </a>

  <a href="https://www.linkedin.com/in/ewerton-renato-67032753/" target="_blank" class="btn linkedin fade-slide" style="animation-delay:1s;">
    <i class="fab fa-linkedin"></i>LINKEDIN
  </a>

  <a href="https://www.youtube.com/@contabilsheets" target="_blank" class="btn youtube fade-slide" style="animation-delay:1.1s;">
    <i class="fab fa-youtube"></i>YOUTUBE
  </a>

  <a href="https://servicos.receita.fazenda.gov.br/servicos/cpf/consultasituacao/consultapublica.asp" target="_blank" class="btn cpf fade-slide" style="animation-delay:1.2s;">
    <i class="fas fa-id-card"></i>CONSULTAR CPF

  <a href="https://solucoes.receita.fazenda.gov.br/servicos/cnpjreva/cnpjreva_solicitacao.asp" target="_blank" class="btn cnpj fade-slide" style="animation-delay:1.3s;">

  <div class="video-box fade-slide" style="animation-delay:1.4s;">

  </div>

  <button class="sound-btn fade-slide" onclick="ativarSom()" style="animation-delay:1.5s;">
    🔊 ATIVAR SOM
  </button>

  <div class="footer fade-slide" style="animation-delay:1.6s;">© 2026</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    playerVars: {
      listType: 'playlist',
      list: 'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR',
      autoplay: 1,
      mute: 1,
      controls: 0,
      loop: 1,
      playlist: 'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR'
    },
    events: {
      onReady: function(e) {
        e.target.playVideo();
      }
    }
  });
}

function ativarSom() {
  if (player) player.unMute();
}
</script>

</body>
</html>
